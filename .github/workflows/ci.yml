# Oracle PL/SQL CI/CD Workflow

name: PL/SQL Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-plsql:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PL/SQL tools
        run: |
          echo "Setting up PL/SQL validation..."
          # Check for required files
          ls -la *.sql

      - name: Validate PL/SQL syntax
        run: |
          echo "Validating PL/SQL files..."
          
          for f in *.sql; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              
              # Check for BEGIN/END blocks
              if grep -qi "BEGIN" "$f"; then
                grep -qi "END" "$f" && echo "  ✓ Has BEGIN/END blocks" || echo "  ✗ Missing END"
              fi
              
              # Check for CREATE statements
              grep -qi "CREATE\s*\(OR\s*REPLACE\)\?\s*\(PROCEDURE\|FUNCTION\|PACKAGE\|TRIGGER\)" "$f" && \
                echo "  ✓ Contains PL/SQL objects"
              
              # Count lines
              lines=$(wc -l < "$f")
              echo "  Lines: $lines"
            fi
          done

      - name: Check for dangerous operations
        run: |
          echo "Checking for dangerous operations..."
          for f in *.sql; do
            if [ -f "$f" ]; then
              if grep -qi "DROP\s*PROCEDURE\|DROP\s*FUNCTION\|DROP\s*PACKAGE\|DROP\s*TRIGGER" "$f"; then
                echo "⚠️ $f: Contains DROP statements"
              fi
              
              # Check for GRANT to public
              if grep -qi "GRANT\s.*\sTO\s\s*PUBLIC" "$f"; then
                echo "⚠️ $f: Contains GRANT TO PUBLIC"
              fi
            fi
          done

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Grype for dependencies
        uses: anchore/scan-action@v3
        with:
          scannerversion: latest
          severity-cutoff: high
          fail-build: false

      - name: Check for SQL injection risks
        run: |
          echo "Checking for potential SQL injection patterns..."
          for f in *.sql; do
            if [ -f "$f" ]; then
              if grep -qi "EXEC\s*IMMEDIATE\|EXECUTE\s+IMMEDIATE\|DBMS_SQL" "$f"; then
                echo "⚠️ $f: Contains dynamic SQL - review for injection"
              fi
            fi
          done

  documentation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          
          [ -f README.md ] && echo "✓ README.md exists" || echo "✗ README.md missing"
          [ -f SECURITY.md ] && echo "✓ SECURITY.md exists" || echo "✗ SECURITY.md missing"
          
          # Check README has key sections
          echo "Checking README structure..."
          grep -q "# " README.md && echo "  ✓ Has headers"
          grep -q "## " README.md && echo "  ✓ Has subheaders"
          grep -q "sql" README.md && echo "  ✓ Has SQL examples"
